  <rect x="30" y="150" width="160" height="3" rx="2" fill="#00ff9d"/>
  <text x="110" y="200" fill="#00ff9d" font-size="32" font-weight="bold" text-anchor="middle">28</text>
  <text x="110" y="225" fill="#718096" font-size="11" text-anchor="middle">DNS RECORDS</text>

