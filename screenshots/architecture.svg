<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070b16"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00ff9d" opacity="0.6"/>
    </marker>
    <marker id="arrow2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00d4ff" opacity="0.6"/>
    </marker>
    <marker id="arrow3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7" opacity="0.6"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <defs>
    <pattern id="g" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#101828" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="900" height="600" fill="url(#g)"/>

  <!-- Title -->
  <text x="450" y="35" fill="#00ff9d" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="4">ARCHITECTURE OVERVIEW</text>
  <text x="450" y="52" fill="#4a5568" font-size="10" text-anchor="middle">ReconRadar APOLLO v6.0</text>

  <!-- ─── User / Browser ─── -->
  <rect x="380" y="70" width="140" height="55" rx="6" fill="#0d1422" stroke="#00d4ff" stroke-width="1.5"/>
  <text x="450" y="95" fill="#00d4ff" font-size="12" text-anchor="middle">🖥</text>
  <text x="450" y="114" fill="#00d4ff" font-size="11" text-anchor="middle" font-weight="bold">Browser / User</text>

  <!-- Arrow down to FastAPI -->
  <line x1="450" y1="125" x2="450" y2="168" stroke="#00d4ff" stroke-width="1.5" marker-end="url(#arrow2)" stroke-dasharray="4,3"/>
  <text x="460" y="150" fill="#4a5568" font-size="9">WebSocket / HTTP</text>

  <!-- ─── FastAPI Core ─── -->
  <rect x="310" y="170" width="280" height="60" rx="6" fill="#0d1930" stroke="#00ff9d" stroke-width="2"/>
  <text x="450" y="196" fill="#00ff9d" font-size="13" text-anchor="middle" font-weight="bold">⚡ FastAPI Backend</text>
  <text x="450" y="214" fill="#4a5568" font-size="9" text-anchor="middle">backend.py  //  uvicorn  //  WebSocket /ws</text>

  <!-- Arrows from FastAPI to modules -->
  <line x1="340" y1="230" x2="160" y2="295" stroke="#00ff9d" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <line x1="390" y1="230" x2="290" y2="295" stroke="#00ff9d" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <line x1="450" y1="230" x2="450" y2="295" stroke="#00ff9d" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <line x1="510" y1="230" x2="610" y2="295" stroke="#00ff9d" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>
  <line x1="560" y1="230" x2="740" y2="295" stroke="#00ff9d" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="3,3"/>

  <!-- ─── Recon Modules ─── -->
  <!-- DNS/WHOIS -->
  <rect x="70" y="295" width="160" height="65" rx="5" fill="#0c1820" stroke="#f59e0b" stroke-width="1"/>
  <text x="150" y="322" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="bold">DNS / WHOIS</text>
  <text x="150" y="338" fill="#4a5568" font-size="9" text-anchor="middle">dnspython</text>
  <text x="150" y="351" fill="#4a5568" font-size="9" text-anchor="middle">python-whois</text>

  <!-- Subdomain -->
  <rect x="245" y="295" width="160" height="65" rx="5" fill="#0c1820" stroke="#10b981" stroke-width="1"/>
  <text x="325" y="322" fill="#10b981" font-size="11" text-anchor="middle" font-weight="bold">Subdomain Enum</text>
  <text x="325" y="338" fill="#4a5568" font-size="9" text-anchor="middle">crt.sh passive</text>
  <text x="325" y="351" fill="#4a5568" font-size="9" text-anchor="middle">bruteforce active</text>

  <!-- Port Scan -->
  <rect x="370" y="295" width="160" height="65" rx="5" fill="#0c1820" stroke="#ef4444" stroke-width="1"/>
  <text x="450" y="322" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="bold">Port Scanner</text>
  <text x="450" y="338" fill="#4a5568" font-size="9" text-anchor="middle">python-nmap</text>
  <text x="450" y="351" fill="#4a5568" font-size="9" text-anchor="middle">socket fallback</text>

  <!-- HTTP Vuln -->
  <rect x="545" y="295" width="160" height="65" rx="5" fill="#0c1820" stroke="#a855f7" stroke-width="1"/>
  <text x="625" y="322" fill="#a855f7" font-size="11" text-anchor="middle" font-weight="bold">HTTP Vuln Scan</text>
  <text x="625" y="338" fill="#4a5568" font-size="9" text-anchor="middle">header analysis</text>
  <text x="625" y="351" fill="#4a5568" font-size="9" text-anchor="middle">path bruteforce</text>

  <!-- OSINT -->
  <rect x="670" y="295" width="160" height="65" rx="5" fill="#0c1820" stroke="#00d4ff" stroke-width="1"/>
  <text x="750" y="322" fill="#00d4ff" font-size="11" text-anchor="middle" font-weight="bold">OSINT Engine</text>
  <text x="750" y="338" fill="#4a5568" font-size="9" text-anchor="middle">115+ sources</text>
  <text x="750" y="351" fill="#4a5568" font-size="9" text-anchor="middle">osint.txt driven</text>

  <!-- ─── Storage Layer ─── -->
  <!-- Arrows down -->
  <line x1="150" y1="360" x2="280" y2="430" stroke="#1e3a5f" stroke-width="1" marker-end="url(#arrow3)" stroke-dasharray="2,3"/>
  <line x1="450" y1="360" x2="450" y2="425" stroke="#1e3a5f" stroke-width="1" marker-end="url(#arrow3)" stroke-dasharray="2,3"/>
  <line x1="750" y1="360" x2="620" y2="430" stroke="#1e3a5f" stroke-width="1" marker-end="url(#arrow3)" stroke-dasharray="2,3"/>

  <text x="450" y="415" fill="#2d3748" font-size="9" text-anchor="middle">persists to</text>

  <!-- Storage boxes -->
  <rect x="210" y="430" width="150" height="55" rx="5" fill="#080e1a" stroke="#2d3748" stroke-width="1"/>
  <text x="285" y="456" fill="#718096" font-size="11" text-anchor="middle">📁 data/</text>
  <text x="285" y="471" fill="#4a5568" font-size="9" text-anchor="middle">wordlist · signatures</text>
  <text x="285" y="484" fill="#4a5568" font-size="9" text-anchor="middle">subdomains · osint</text>

  <rect x="375" y="430" width="150" height="55" rx="5" fill="#080e1a" stroke="#2d3748" stroke-width="1"/>
  <text x="450" y="456" fill="#718096" font-size="11" text-anchor="middle">📊 reports/</text>
  <text x="450" y="471" fill="#4a5568" font-size="9" text-anchor="middle">HTML per scan</text>
  <text x="450" y="484" fill="#4a5568" font-size="9" text-anchor="middle">index.json history</text>

  <rect x="540" y="430" width="150" height="55" rx="5" fill="#080e1a" stroke="#2d3748" stroke-width="1"/>
  <text x="615" y="456" fill="#718096" font-size="11" text-anchor="middle">📝 logs/</text>
  <text x="615" y="471" fill="#4a5568" font-size="9" text-anchor="middle">reconradar.log</text>
  <text x="615" y="484" fill="#4a5568" font-size="9" text-anchor="middle">RotatingFileHandler</text>

  <!-- Frontend note -->
  <rect x="310" y="510" width="280" height="50" rx="5" fill="#0d1422" stroke="#4a5568" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="450" y="532" fill="#4a5568" font-size="11" text-anchor="middle">frontend.py</text>
  <text x="450" y="548" fill="#2d3748" font-size="9" text-anchor="middle">HTML_TEMPLATE  //  injected into FastAPI response</text>

  <!-- Footer -->
  <text x="450" y="585" fill="#1e2d40" font-size="9" text-anchor="middle">github.com/Nexvir — ReconRadar APOLLO v6.0</text>
</svg>
