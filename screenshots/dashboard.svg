      <stop offset="50%" stop-color="#00d4ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff9d"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="750" fill="url(#grid)"/>

  <!-- Header bar -->
  <rect width="1200" height="60" fill="url(#headerGrad)"/>
