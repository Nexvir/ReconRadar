  <text x="30" y="740" fill="#2d3748" font-size="10">ReconRadar APOLLO v6.0  //  github.com/Nexvir  //  For authorized security testing only</text>
  <text x="1170" y="740" fill="#2d3748" font-size="10" text-anchor="end">2026</text>
