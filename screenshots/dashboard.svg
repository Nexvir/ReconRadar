    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2040" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
