<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <!-- Background -->
  <rect width="1200" height="750" fill="#0a0e1a"/>
  <!-- Grid lines -->
